<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PalWorld ?蝺刻摩??/title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: rgba(255, 250, 242, 0.92);
      --panel-strong: #fff7ee;
      --line: #d4c1ac;
      --text: #2d241d;
      --muted: #6f5d50;
      --accent: #cb5c2a;
      --accent-strong: #8c2f12;
      --shadow: 0 24px 60px rgba(84, 42, 17, 0.16);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(203, 92, 42, 0.2), transparent 28%),
        radial-gradient(circle at bottom right, rgba(120, 146, 82, 0.18), transparent 26%),
        linear-gradient(160deg, #efe5d7 0%, #f8f2e8 55%, #eee0cb 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 32vw;
      height: 32vw;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(30px);
      opacity: 0.22;
    }

    body::before {
      top: -8vw;
      right: -10vw;
      background: #c86f39;
    }

    body::after {
      bottom: -10vw;
      left: -12vw;
      background: #7b9e55;
    }

    .shell {
      position: relative;
      z-index: 1;
      max-width: 1440px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .hero {
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
      animation: slide-in 500ms ease-out;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--accent-strong);
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-family: "Segoe UI Semibold", "Noto Sans TC", sans-serif;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
    }

    .intro {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 1rem;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 440px) minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(212, 193, 172, 0.65);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .panel-section {
      padding: 22px;
      border-bottom: 1px solid rgba(212, 193, 172, 0.5);
    }

    .panel-section:last-child {
      border-bottom: 0;
    }

    .panel-title {
      margin: 0 0 8px;
      font-size: 1.05rem;
    }

    .panel-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.94rem;
    }

    textarea,
    input,
    select {
      width: 100%;
      border: 1px solid #ccb69f;
      border-radius: 14px;
      background: rgba(255, 253, 248, 0.96);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    textarea:focus,
    input:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(203, 92, 42, 0.12);
    }

    textarea {
      min-height: 280px;
      resize: vertical;
      line-height: 1.5;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 0.92rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
      box-shadow: none;
      transform: none;
      filter: grayscale(0.18);
    }

    button:disabled:hover,
    button:disabled:active {
      transform: none;
    }

    .primary {
      background: linear-gradient(135deg, var(--accent) 0%, #de7d43 100%);
      color: #fff7f2;
      box-shadow: 0 12px 24px rgba(203, 92, 42, 0.28);
    }

    .secondary {
      background: #efe2d1;
      color: var(--accent-strong);
    }

    .ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(203, 92, 42, 0.2);
    }

    .status {
      min-height: 24px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .status.error {
      color: #9f2e1d;
    }

    .status.success {
      color: #2f6d2f;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .mode-options {
      display: grid;
      gap: 10px;
    }

    .mode-option {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      padding: 14px;
      border-radius: 16px;
      background: rgba(247, 240, 230, 0.76);
      border: 1px solid rgba(212, 193, 172, 0.45);
      cursor: pointer;
    }

    .mode-option input {
      width: auto;
      margin-top: 2px;
      accent-color: var(--accent);
    }

    .mode-option strong {
      display: block;
      margin-bottom: 4px;
      font-size: 0.95rem;
    }

    .mode-option span {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(203, 92, 42, 0.08);
      color: var(--accent-strong);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .groups {
      display: grid;
      gap: 16px;
    }

    .group {
      padding: 18px;
      border-radius: 20px;
      background: var(--panel-strong);
      border: 1px solid rgba(212, 193, 172, 0.6);
      animation: rise-in 360ms ease both;
    }

    .group h2 {
      margin: 0 0 6px;
      font-size: 1.05rem;
    }

    .group p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(247, 240, 230, 0.76);
      border: 1px solid rgba(212, 193, 172, 0.45);
      min-width: 0;
    }

    .field label {
      font-size: 0.92rem;
      font-weight: 700;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .field small {
      color: var(--muted);
      min-height: 1.2em;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .field code {
      display: block;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 0.8rem;
      color: #8a6a55;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .field-description {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.5;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .output-box {
      min-height: 220px;
    }

    .mode-block.is-hidden {
      display: none;
    }

    .hint-list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.92rem;
    }

    .empty {
      padding: 30px 22px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(203, 92, 42, 0.25);
      border-radius: 20px;
      background: rgba(255, 252, 247, 0.8);
    }

    @keyframes slide-in {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes rise-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1120px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .shell {
        padding: 20px 14px 36px;
      }

      .panel-section,
      .group {
        padding: 16px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .stats {
        justify-content: flex-start;
      }
    }
  </style>
</head>
