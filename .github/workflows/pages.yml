name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PAGES_PAT: ${{ secrets.PAGES_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        if: ${{ env.PAGES_PAT != '' }}
        uses: actions/configure-pages@v6
        with:
          token: ${{ env.PAGES_PAT }}
          enablement: true

      - name: Verify Pages is enabled
        if: ${{ env.PAGES_PAT == '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          status="$(curl -sS -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")"

          if [ "$status" = "404" ]; then
            echo "::error title=GitHub Pages is not enabled::Open Settings > Pages and set Source to GitHub Actions, or add a PAGES_PAT secret so the workflow can enable Pages automatically."
            cat response.json
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5